<main>
<section class="section">
  <div class="container" style="max-width:640px;">
    <p class="section-label">| Contact |</p>
    <h1>Contact</h1>
    <p style="font-family:var(--font-body); font-size:1.05rem; color:var(--color-muted); margin-top:.75rem; margin-bottom:2.5rem;">Editorial inquiries, corrections, and operator updates. We respond to editorial inquiries and corrections within 5 business days.</p>

    <div style="background:var(--color-bg-alt); border-radius:var(--radius); padding:1.5rem; margin-bottom:2.5rem; border:1px solid var(--color-border);">
      <div style="font-family:var(--font-ui); font-size:.8rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--color-muted); margin-bottom:.5rem;">Email</div>
      <a href="mailto:contact@best-antarctica-expedition-cruises.com" style="font-family:var(--font-display); font-weight:700; font-size:1rem; color:var(--color-accent);">contact@best-antarctica-expedition-cruises.com</a>
    </div>

    <form action="mailto:contact@best-antarctica-expedition-cruises.com" method="post" enctype="text/plain" style="display:grid; gap:1.25rem;">
      <div>
        <label style="display:block; font-family:var(--font-ui); font-size:.82rem; font-weight:600; color:var(--color-dark); margin-bottom:.4rem;">Name</label>
        <input type="text" name="name" required
               style="width:100%; padding:.7rem 1rem; border:1px solid var(--color-border); border-radius:var(--radius); font-family:var(--font-ui); font-size:.92rem; color:var(--color-text); background:#fff; outline:none; transition:border-color .2s;"
               onfocus="this.style.borderColor='var(--color-accent)'" onblur="this.style.borderColor='var(--color-border)'">
      </div>
      <div>
        <label style="display:block; font-family:var(--font-ui); font-size:.82rem; font-weight:600; color:var(--color-dark); margin-bottom:.4rem;">Email</label>
        <input type="email" name="email" required
               style="width:100%; padding:.7rem 1rem; border:1px solid var(--color-border); border-radius:var(--radius); font-family:var(--font-ui); font-size:.92rem; color:var(--color-text); background:#fff; outline:none; transition:border-color .2s;"
               onfocus="this.style.borderColor='var(--color-accent)'" onblur="this.style.borderColor='var(--color-border)'">
      </div>
      <div>
        <label style="display:block; font-family:var(--font-ui); font-size:.82rem; font-weight:600; color:var(--color-dark); margin-bottom:.4rem;">Message</label>
        <textarea name="message" rows="5" required
                  style="width:100%; padding:.7rem 1rem; border:1px solid var(--color-border); border-radius:var(--radius); font-family:var(--font-ui); font-size:.92rem; color:var(--color-text); background:#fff; resize:vertical; outline:none; transition:border-color .2s;"
                  onfocus="this.style.borderColor='var(--color-accent)'" onblur="this.style.borderColor='var(--color-border)'"></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:fit-content;">Send Message</button>
    </form>
  </div>
</section>
</main>
